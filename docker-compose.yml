services:
  collector:
    image: ${COLLECTOR_IMAGE:-kimsehee98/trypto-collector:v1}
    pull_policy: always
    networks:
      - trypto-net
    ports:
      - "8081:8081"
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_RABBITMQ_HOST: rabbitmq
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: trypto-collector-token
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: 1234
      MANAGEMENT_PORT: 9090
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9090/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  prometheus:
    image: prom/prometheus:latest
    networks:
      - trypto-net
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    depends_on:
      - collector

  grafana:
    image: grafana/grafana:latest
    networks:
      - trypto-net
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    networks:
      - trypto-net
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    networks:
      - trypto-net
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - --path.rootfs=/host
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
